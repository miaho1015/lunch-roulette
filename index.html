<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>瑪箖午餐輪盤</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #16162a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 20px 40px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        .wheel-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 22px solid #ff6b6b;
            z-index: 10;
            filter: drop-shadow(0 2px 6px rgba(255,107,107,0.6));
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.06);
        }

        .result {
            text-align: center;
            height: 64px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-label {
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-text {
            font-size: 2rem;
            font-weight: 900;
            color: #ff8e53;
            opacity: 0;
            transform: scale(0.7) translateY(6px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .result-text.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .spin-btn {
            display: block;
            padding: 14px 52px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,107,107,0.45);
            transition: transform 0.12s, box-shadow 0.12s;
            margin-bottom: 32px;
        }

        .spin-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255,107,107,0.3); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .section-title {
            width: 100%;
            max-width: 340px;
            font-size: 0.72rem;
            color: #555;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .restaurant-list {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .item-name { flex: 1; font-size: 0.93rem; }

        .del-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 2px;
            transition: color 0.2s;
        }
        .del-btn:hover { color: #ff6b6b; }

        .add-row {
            width: 100%;
            max-width: 340px;
            display: flex;
            gap: 8px;
        }

        .add-input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.93rem;
        }
        .add-input::placeholder { color: #444; }
        .add-input:focus { outline: none; border-color: rgba(255,142,83,0.5); }

        .add-btn {
            padding: 10px 18px;
            background: rgba(255,142,83,0.15);
            border: 1px solid rgba(255,142,83,0.35);
            border-radius: 10px;
            color: #ff8e53;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover { background: rgba(255,142,83,0.28); }
    </style>
</head>
<body>

<h1>午餐輪盤</h1>
<p class="subtitle">今天吃什麼，交給命運決定</p>

<div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="300" height="300"></canvas>
</div>

<div class="result">
    <div class="result-label">今天吃</div>
    <div class="result-text" id="resultText"></div>
</div>

<button class="spin-btn" id="spinBtn" onclick="spin()">轉！</button>

<div class="section-title">餐廳清單</div>
<div class="restaurant-list" id="restaurantList"></div>
<div class="add-row">
    <input class="add-input" id="addInput" placeholder="新增餐廳…" maxlength="10">
    <button class="add-btn" onclick="addItem()">+</button>
</div>

<script>
const COLORS = [
    '#FF6B6B','#FF8E53','#FFC93C','#6BCB77',
    '#4D96FF','#C77DFF','#FF6BD6','#00C9A7',
    '#F72585','#7209B7'
];

const DEFAULTS = ['雞飯','義大利麵','咖哩','泰式','韓式','夏威夷飯','滷味'];
let items = JSON.parse(localStorage.getItem('lunchRoulette') || 'null') || DEFAULTS;
let angle = 0;
let spinning = false;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

function save() { localStorage.setItem('lunchRoulette', JSON.stringify(items)); }

function drawWheel() {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const r = cx - 5;
    const n = items.length;
    const slice = (2 * Math.PI) / n;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < n; i++) {
        const s = angle + i * slice;
        const e = s + slice;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, s, e);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = 'rgba(22,22,42,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(s + slice / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        const fs = n > 8 ? 11 : n > 6 ? 12 : 13;
        ctx.font = `700 ${fs}px -apple-system, sans-serif`;
        ctx.fillText(items[i], r - 14, 5);
        ctx.restore();
    }

    // center
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
    ctx.fillStyle = '#16162a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
}

function getWinner() {
    const n = items.length;
    const slice = (2 * Math.PI) / n;
    const norm = ((-Math.PI / 2 - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    return items[Math.floor(norm / slice) % n];
}

function spin() {
    if (spinning || items.length < 2) return;
    spinning = true;
    document.getElementById('spinBtn').disabled = true;
    const rt = document.getElementById('resultText');
    rt.classList.remove('show');

    const total = (5 + Math.random() * 5) * 2 * Math.PI + Math.random() * 2 * Math.PI;
    const start = angle;
    const duration = 3800;
    let t0 = null;

    function ease(t) { return 1 - Math.pow(1 - t, 4); }

    function frame(ts) {
        if (!t0) t0 = ts;
        const p = Math.min((ts - t0) / duration, 1);
        angle = start + total * ease(p);
        drawWheel();

        if (p < 1) {
            requestAnimationFrame(frame);
        } else {
            angle = (start + total) % (2 * Math.PI);
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            rt.textContent = getWinner();
            rt.classList.add('show');
        }
    }
    requestAnimationFrame(frame);
}

function renderList() {
    const el = document.getElementById('restaurantList');
    el.innerHTML = '';
    items.forEach((name, i) => {
        const d = document.createElement('div');
        d.className = 'item';
        d.innerHTML = `
            <div class="dot" style="background:${COLORS[i % COLORS.length]}"></div>
            <span class="item-name">${name}</span>
            <button class="del-btn" onclick="deleteItem(${i})">✕</button>
        `;
        el.appendChild(d);
    });
}

function addItem() {
    const input = document.getElementById('addInput');
    const v = input.value.trim();
    if (!v) return;
    items.push(v);
    save(); input.value = '';
    renderList(); drawWheel();
}

function deleteItem(i) {
    if (items.length <= 2) { alert('至少需要 2 間餐廳'); return; }
    items.splice(i, 1);
    save(); renderList(); drawWheel();
}

document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
});

renderList();
drawWheel();
</script>
</body>
</html>
